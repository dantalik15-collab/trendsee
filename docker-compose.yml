services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trendsee
      POSTGRES_PASSWORD: trendsee_secret
      POSTGRES_DB: trendsee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendsee"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: trendsee
      POSTGRES_PASSWORD: trendsee_secret
      POSTGRES_DB: trendsee
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: trendsee-docker-secret-key
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
